physics:
  initial_state: [1.0, 3.0, 45, 0.0]
  target: [0.0, 0.0]
  turning_radius: 0.5
  dt: 0.05

controller:
  constant_vx: -1.0
  K_dist: 8.0             # Weight for the distance cost
  K_turn: 1.5             # Weight for the turning cost
  K_hitch: 0.0
  horizon: 10
  lookahead_distance: 0.5

cart_dimensions:
  width: 0.5
  length: 0.25            # Distance of grabbing bar to fixed wheels
  gripper_length: 0.45    # Distance from the robot's center to the gripper
  gripper_angle_limit: 37   # Maximum gripper angle (in degrees)
  fixed_wheel_dist: 0.25
